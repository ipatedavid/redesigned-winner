<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Înregistrare - Game Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: #0a0c0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #1a1d26;
            border: 1px solid #2c2f36;
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 25px -10px rgba(0,0,0,0.8);
        }
        .auth-card h2, .auth-card h5 {
            color: #fff;
        }
        .form-control {
            background: #0f1117;
            border: 1px solid #2c2f36;
            color: #e0e0e0;
        }
        .form-control:focus {
            background: #0f1117;
            border-color: #ff8c42;
            box-shadow: 0 0 0 3px rgba(255,140,66,0.2);
            color: #fff;
        }
        .btn-auth {
            background: transparent;
            border: 2px solid #ff8c42;
            border-radius: 40px;
            color: #ff8c42;
            font-weight: 600;
            padding: 10px;
            transition: 0.2s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-auth:hover {
            background: #ff8c42;
            color: #0a0c0f;
        }
        a {
            color: #ff8c42;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 class="text-center mb-4">
            <i class="fa-solid fa-gamepad me-2" style="color: #ff8c42;"></i>Game Hub
        </h2>
        <h5 class="text-center mb-4">Înregistrare</h5>
        <form id="registerForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Parolă</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirmă parola</label>
                <input type="password" class="form-control" id="confirmPassword" required>
            </div>
            <button type="submit" class="btn-auth">Înregistrare</button>
            <p class="text-center mt-3">
                Ai deja cont? <a href="login.html">Autentifică-te</a>
            </p>
            <div id="message" class="text-center mt-2 small"></div>
        </form>
    </div>

    <script type="module">
        import { register } from './js/auth.js';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');

            if (password !== confirm) {
                messageDiv.innerHTML = '<span class="text-danger">Parolele nu coincid.</span>';
                return;
            }
            if (password.length < 6) {
                messageDiv.innerHTML = '<span class="text-danger">Parola trebuie să aibă cel puțin 6 caractere.</span>';
                return;
            }

            messageDiv.innerHTML = '<span class="text-info">Se procesează...</span>';
            const result = await register(email, password);
            if (result.success) {
                messageDiv.innerHTML = '<span class="text-success">Cont creat! Redirecționare...</span>';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                messageDiv.innerHTML = `<span class="text-danger">${result.error}</span>`;
            }
        });
    </script>
</body>
</html>
