<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub - Joacă</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome pentru icoane -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Stil general pagină */
        body {
            background: #0a0c0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* Navbar stil și transparență */
        .navbar {
            background: rgba(20,22,27,0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #2c2f36;
        }

        /* Brand navbar */
        .navbar-brand {
            font-weight: 600;
            color: #fff !important;
        }

        /* Container DOSBox */
        .dos-container {
            width: 100%;
            max-width: 800px;
            height: 500px;
            margin: 0 auto;
            border: 2px solid #2c2f36;
            border-radius: 16px;
            overflow: hidden;
            background: black;
        }

        /* Canvas joc */
        .dos-container canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Buton secundar */
        .btn-outline-secondary {
            border-color: #3a3f4b;
            color: #b0b3b8;
        }

        .btn-outline-secondary:hover {
            background-color: #2c2f36;
            border-color: #ff8c42;
            color: #fff;
        }

        /* Card recomandări jocuri */
        .recom-card {
            background: #1a1d26;
            border: 1px solid #2c2f36;
            border-radius: 16px;
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .recom-card:hover {
            border-color: #ff8c42;
        }

        /* Ascunde input fișier joc */
        #game-file{
            display: none !important;
        }

        /* Imagine card recomandări */
        .recom-card .card-img-top {
            height: 120px;
            object-fit: cover;
            background: #2c2f36;
        }

        /* Body card recomandări */
        .recom-card .card-body {
            display: flex;
            flex-direction: column;
        }

        /* Titlu secțiune */
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #fff;
            border-left: 4px solid #ff8c42;
            padding-left: 1rem;
        }

        /* Descriere joc */
        #game-description {
            background: #1a1d26;
            border: 1px solid #2c2f36;
            border-radius: 12px;
            padding: 1rem;
        }

        /* Buton Play */
        .btn-play {
            background: transparent;
            border: 2px solid #ff8c42;
            border-radius: 40px;
            color: #ff8c42;
            font-weight: 600;
            padding: 8px 0;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85rem;
            width: 100%;
        }

        .btn-play:hover {
            background: #ff8c42;
            color: #0a0c0f;
            border-color: #ff8c42;
        }

        /* Stil pentru secțiunea utilizator în navbar */
        #user-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Stil pentru butonul inimă */
        .favorite-btn {
            background: none;
            border: none;
            font-size: 2rem;
            padding: 0;
            transition: transform 0.2s;
            line-height: 1;
        }
        .favorite-btn:hover {
            transform: scale(1.1);
        }
        .favorite-btn.text-danger i {
            color: #ff4d4d;
        }
        .favorite-btn.text-secondary i {
            color: #6c757d;
        }
        .game-title-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body data-bs-theme="dark">

<!-- Navbar sus -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <!-- Brand cu icoană -->
        <a class="navbar-brand" href="index.html">
            <i class="fa-solid fa-gamepad me-2" style="color: #ff8c42;"></i>Game Hub
        </a>

        <!-- Secțiunea de utilizator (dreapta) -->
        <div id="user-section">
            <!-- Aici va fi injectat dinamic conținutul de login/logout -->
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- Info joc -->
    <div id="game-info" class="mb-4">
        <div class="game-title-wrapper">
            <h2 class="display-6 mb-0" id="game-title"></h2>
            <button id="favorite-btn" class="favorite-btn text-secondary">
                <i id="favorite-icon" class="fa-regular fa-heart"></i>
            </button>
        </div>
        <p class="text-muted" id="game-file"></p> <!-- Fișier joc (ascuns) -->
        <div id="game-description"></div> <!-- Descriere joc -->
    </div>

    <!-- Container DOSBox -->
    <div id="dosbox" class="dos-container"></div>

    <!-- Secțiune recomandări jocuri -->
    <div id="recommended-section" class="mt-5" style="display: none;">
        <h2 class="section-title">
            <i class="fa-regular fa-star me-2"></i>Recomandate
        </h2>
        <div class="row row-cols-2 row-cols-md-4 g-3" id="recommended-container"></div>
    </div>

</div>

<!-- Script DOSBox -->
<script src="https://js-dos.com/6.22/current/js-dos.js"></script>
<!-- Script custom joc -->
<script src="js/game.js"></script>

<!-- Script unificat (modul) -->
<script type="module">
    // 1. Importuri Firebase
    import { auth, db } from './js/firebase-config.js';
    import { onAuthStateChange, logout } from './js/auth.js';
    import { doc, getDoc, setDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 2. Variabile globale
    let currentUser = null;
    let currentGameId = null;
    let isFavorite = false;

    // 3. Referințe către elemente DOM
    const userSection = document.getElementById('user-section');
    const favoriteBtn = document.getElementById('favorite-btn');
    const favoriteIcon = document.getElementById('favorite-icon');
    const gameTitleEl = document.getElementById('game-title');
    const gameFileEl = document.getElementById('game-file');
    const gameDescEl = document.getElementById('game-description');
    const dosboxEl = document.getElementById('dosbox');
    const recommendedSection = document.getElementById('recommended-section');
    const recommendedContainer = document.getElementById('recommended-container');

    // 4. Funcție pentru actualizarea secțiunii utilizator (login/logout)
    function updateUserSection(user) {
        if (user) {
            userSection.innerHTML = `
                <span class="text-light me-2">
                    <i class="fa-regular fa-circle-user me-1"></i>${user.email}
                </span>
                <button class="btn btn-outline-secondary" id="logoutBtn">
                    <i class="fa-solid fa-sign-out-alt me-2"></i>Logout
                </button>
            `;
            document.getElementById('logoutBtn')?.addEventListener('click', async () => {
                await logout();
            });
        } else {
            userSection.innerHTML = `
                <a href="login.html" class="btn btn-play me-2" style="width: auto; padding: 8px 20px;">
                    <i class="fa-solid fa-sign-in-alt me-2"></i>Login
                </a>
                <a href="register.html" class="btn btn-play" style="width: auto; padding: 8px 20px;">
                    <i class="fa-regular fa-circle-play me-2"></i>Register
                </a>
            `;
        }
    }

    // 5. Verifică dacă jocul curent este în favoritele utilizatorului
    async function checkIfFavorite(uid, gameId) {
        try {
            const favRef = doc(db, 'favorites', uid);
            const favSnap = await getDoc(favRef);
            if (favSnap.exists()) {
                const gameIds = favSnap.data().gameIds || [];
                isFavorite = gameIds.includes(gameId);
            } else {
                // Creează documentul dacă nu există
                await setDoc(favRef, { gameIds: [] });
                isFavorite = false;
            }
            updateFavoriteButton(isFavorite);
        } catch (error) {
            console.error('Eroare la verificarea favorite:', error);
        }
    }

    // 6. Actualizează aspectul butonului inimă
    function updateFavoriteButton(fav) {
        if (fav) {
            favoriteIcon.className = 'fa-solid fa-heart';
            favoriteBtn.classList.remove('text-secondary');
            favoriteBtn.classList.add('text-danger');
        } else {
            favoriteIcon.className = 'fa-regular fa-heart';
            favoriteBtn.classList.remove('text-danger');
            favoriteBtn.classList.add('text-secondary');
        }
    }

    // 7. Funcție pentru toggle favorite
    async function toggleFavorite() {
        if (!currentUser) {
            alert('Trebuie să fii autentificat pentru a adăuga la favorite.');
            return;
        }
        if (!currentGameId) return;

        const uid = currentUser.uid;
        const favRef = doc(db, 'favorites', uid);
        try {
            if (isFavorite) {
                await updateDoc(favRef, {
                    gameIds: arrayRemove(currentGameId)
                });
                isFavorite = false;
            } else {
                await updateDoc(favRef, {
                    gameIds: arrayUnion(currentGameId)
                });
                isFavorite = true;
            }
            updateFavoriteButton(isFavorite);
        } catch (error) {
            console.error('Eroare la actualizarea favorite:', error);
        }
    }

    // 8. Încărcare și afișare joc
    async function loadGame() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) {
            location.href = 'index.html';
            return;
        }
        currentGameId = id;

        try {
            const res = await fetch('/api/games');
            const games = await res.json();
            const game = games.find(g => String(g.id) === String(id));
            if (!game) {
                alert('Joc inexistent');
                location.href = 'index.html';
                return;
            }

            // Afișează informațiile jocului
            gameTitleEl.textContent = game.title;
            gameFileEl.textContent = game.file;
            if (game.description) {
                gameDescEl.innerHTML = `<i class="fa-regular fa-file-lines me-2"></i>${escapeHtml(game.description)}`;
            } else {
                gameDescEl.innerHTML = '<span class="text-muted"><i class="fa-regular fa-circle-exclamation me-2"></i>Descriere lipsă</span>';
            }

            // Salvează în recente (folosind funcția din game.js - deja existentă)
            storeRecentlyPlayed(game);

            // Pornește jocul în DOSBox (folosind funcția din game.js - deja existentă)
            startGame(game);

            // Încarcă recomandările (folosind funcția din game.js - deja existentă)
            loadRecommended(games, game);

            // Verifică starea de favorite dacă utilizatorul este autentificat
            if (currentUser) {
                await checkIfFavorite(currentUser.uid, currentGameId);
            } else {
                updateFavoriteButton(false);
            }
        } catch (e) {
            console.error(e);
            gameDescEl.innerHTML = '<p class="text-danger">Eroare la încărcarea jocului.</p>';
        }
    }

    // 9. Funcții de ajutor (escapeHtml, storeRecentlyPlayed, startGame, loadRecommended)
    // Acestea sunt deja definite în js/game.js, dar le definim și aici pentru siguranță
    function escapeHtml(unsafe) {
        return unsafe.replace(/[&<>"']/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            if (m === "'") return '&#039;';
            return m;
        });
    }

    // Notă: Funcțiile storeRecentlyPlayed, startGame și loadRecommended sunt deja în game.js
    // și vor fi apelate mai sus. Le lăsăm așa cum sunt în fișierul extern.

    // 10. Ascultător pentru schimbarea stării de autentificare
    onAuthStateChange(async (user) => {
        currentUser = user;
        updateUserSection(user);
        if (user && currentGameId) {
            await checkIfFavorite(user.uid, currentGameId);
        } else {
            updateFavoriteButton(false);
        }
    });

    // 11. Inițializare la încărcarea paginii
    document.addEventListener('DOMContentLoaded', () => {
        loadGame();

        // Eveniment click pe butonul de favorite
        favoriteBtn.addEventListener('click', toggleFavorite);
    });
</script>

</body>
</html>
