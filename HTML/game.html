<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub - Joacă</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
        }
        .navbar {
            background-color: #1f1f1f !important;
            border-bottom: 1px solid #333;
        }
        .navbar-brand {
            font-weight: 600;
            color: #fff !important;
        }
    .dos-container {
    width: 800px;   /* dimensiunea implicită a jocului pe PC */
    height: 500px;  /* înălțimea implicită */
    margin: 0 auto;
    border: 1px solid #444;
    border-radius: 8px;
    overflow: hidden;
    background-color: black;
    position: relative;
}

.dos-container canvas {
    width: 100%;
    height: 100%;
    display: block;
}
        .game-info {
            margin-top: 20px;
        }
        .recommendations .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            transition: transform 0.2s;
        }
        .recommendations .card:hover {
            transform: scale(1.02);
            border-color: #ff8c42;
        }
        .btn-outline-warning {
            color: #ff8c42;
            border-color: #ff8c42;
        }
        .btn-outline-warning:hover {
            background-color: #ff8c42;
            color: #000;
        }
        .form-control {
            background-color: #121212;
            border-color: #444;
            color: #fff;
        }
        .form-control:focus {
            background-color: #1e1e1e;
            border-color: #666;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(138, 180, 248, 0.25);
        }
        .form-control::placeholder {
            color: #aaa;
        }
        i {
            color: #ddd;
        }
        .instructions {
            background-color: #1e1e1e;
            border-left: 4px solid #ff8c42;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            text-align: left;
        }
        .instructions code {
            background-color: #333;
            padding: 2px 5px;
            border-radius: 3px;
            color: #ff8c42;
        }
    </style>
</head>
<body data-bs-theme="dark">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="fa-solid fa-gamepad me-2"></i>Game Hub
            </a>
            <form class="d-flex mx-auto" role="search" style="width: 40%;">
                <input class="form-control me-2" type="search" placeholder="Caută jocuri abandonware..." aria-label="Search">
                <button class="btn btn-outline-success" type="submit"><i class="fa-solid fa-search"></i></button>
            </form>
            <div>
                <i class="fa-regular fa-bell fs-5 me-3"></i>
                <i class="fa-regular fa-user fs-5"></i>
            </div>
        </div>
    </nav>

    <!-- Conținut principal -->
    <div class="container mt-4">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div id="game-area">
                    <div class="game-info text-center mb-3">
                        <h2>4D Prince of Persia</h2>
                        <p>O versiune specială a clasicului Prince of Persia (1994).</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Secțiunea de recomandări -->
        <div class="recommendations mt-5">
            <h4 class="mb-3"><i class="fa-regular fa-star me-2"></i>Recomandări</h4>
            <div class="row row-cols-1 row-cols-md-4 g-4" id="recommendations-list">
                <!-- Cardurile vor fi generate dinamic cu JS -->
            </div>
        </div>
    </div>

    <!-- JS DosBox și joc -->
    <script src="https://js-dos.com/6.22/current/js-dos.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
