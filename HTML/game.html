<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub - Joacă</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome pentru icoane -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Stil general pagină */
        body {
            background: #0a0c0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* Navbar stil și transparență */
        .navbar {
            background: rgba(20,22,27,0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #2c2f36;
        }

        /* Brand navbar */
        .navbar-brand {
            font-weight: 600;
            color: #fff !important;
        }

        /* Container DOSBox */
        .dos-container {
            width: 100%;
            max-width: 800px;
            height: 500px;
            margin: 0 auto;
            border: 2px solid #2c2f36;
            border-radius: 16px;
            overflow: hidden;
            background: black;
        }

        /* Canvas joc */
        .dos-container canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Buton secundar */
        .btn-outline-secondary {
            border-color: #3a3f4b;
            color: #b0b3b8;
        }

        .btn-outline-secondary:hover {
            background-color: #2c2f36;
            border-color: #ff8c42;
            color: #fff;
        }

        /* Card recomandări jocuri */
        .recom-card {
            background: #1a1d26;
            border: 1px solid #2c2f36;
            border-radius: 16px;
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .recom-card:hover {
            border-color: #ff8c42;
        }

        /* Ascunde input fișier joc */
        #game-file{
            display: none !important;
        }

        /* Imagine card recomandări */
        .recom-card .card-img-top {
            height: 120px;
            object-fit: cover;
            background: #2c2f36;
        }

        /* Body card recomandări */
        .recom-card .card-body {
            display: flex;
            flex-direction: column;
        }

        /* Titlu secțiune */
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #fff;
            border-left: 4px solid #ff8c42;
            padding-left: 1rem;
        }

        /* Descriere joc */
        #game-description {
            background: #1a1d26;
            border: 1px solid #2c2f36;
            border-radius: 12px;
            padding: 1rem;
        }

        /* Buton Play */
        .btn-play {
            background: transparent;
            border: 2px solid #ff8c42;
            border-radius: 40px;
            color: #ff8c42;
            font-weight: 600;
            padding: 8px 0;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85rem;
            width: 100%;
        }

        .btn-play:hover {
            background: #ff8c42;
            color: #0a0c0f;
            border-color: #ff8c42;
        }

        /* Stil pentru secțiunea utilizator în navbar */
        #user-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>

<body data-bs-theme="dark">

<!-- Navbar sus -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <!-- Brand cu icoană -->
        <a class="navbar-brand" href="index.html">
            <i class="fa-solid fa-gamepad me-2" style="color: #ff8c42;"></i>Game Hub
        </a>

        <!-- Secțiunea de utilizator (dreapta) -->
        <div id="user-section">
            <!-- Aici va fi injectat dinamic conținutul de login/logout -->
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- Info joc -->
    <div id="game-info" class="mb-4">
        <h2 class="display-6" id="game-title"></h2> <!-- Titlu joc -->
        <p class="text-muted" id="game-file"></p> <!-- Fișier joc (ascuns) -->
        <div id="game-description"></div> <!-- Descriere joc -->
    </div>

    <!-- Container DOSBox -->
    <div id="dosbox" class="dos-container"></div>

    <!-- Secțiune recomandări jocuri -->
    <div id="recommended-section" class="mt-5" style="display: none;">
        <h2 class="section-title">
            <i class="fa-regular fa-star me-2"></i>Recomandate
        </h2>
        <div class="row row-cols-2 row-cols-md-4 g-3" id="recommended-container"></div>
    </div>

</div>

<!-- Script DOSBox -->
<script src="https://js-dos.com/6.22/current/js-dos.js"></script>
<!-- Script custom joc -->
<script src="js/game.js"></script>

<!-- Script pentru autentificare -->
<script type="module">
    import { auth } from './js/firebase-config.js';
    import { onAuthStateChange, logout } from './js/auth.js';

    const userSection = document.getElementById('user-section');

    function updateUserSection(user) {
        if (user) {
            // Utilizator autentificat
            userSection.innerHTML = `
                <span class="text-light me-2">
                    <i class="fa-regular fa-circle-user me-1"></i>${user.email}
                </span>
                <button class="btn btn-outline-secondary" id="logoutBtn">
                    <i class="fa-solid fa-sign-out-alt me-2"></i>Logout
                </button>
            `;
            document.getElementById('logoutBtn')?.addEventListener('click', async () => {
                await logout();
                // După logout, pagina se reîncarcă automat prin onAuthStateChange
            });
        } else {
            // Utilizator neautentificat
            userSection.innerHTML = `
                <a href="login.html" class="btn btn-play me-2" style="width: auto; padding: 8px 20px;">
                    <i class="fa-solid fa-sign-in-alt me-2"></i>Login
                </a>
                <a href="register.html" class="btn btn-play" style="width: auto; padding: 8px 20px;">
                    <i class="fa-regular fa-circle-play me-2"></i>Register
                </a>
            `;
        }
    }

    // Ascultă modificările stării de autentificare
    onAuthStateChange((user) => {
        updateUserSection(user);
    });
</script>

</body>
</html>
