<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub - Emulator</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Stiluri identice cu game.html */
        body {
            background: #0a0c0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .navbar {
            background: rgba(20,22,27,0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #2c2f36;
        }
        .navbar-brand {
            font-weight: 600;
            color: #fff !important;
        }
        .btn-outline-secondary {
            border-color: #3a3f4b;
            color: #b0b3b8;
        }
        .btn-outline-secondary:hover {
            background-color: #2c2f36;
            border-color: #ff8c42;
            color: #fff;
        }
        .btn-play {
            background: transparent;
            border: 2px solid #ff8c42;
            border-radius: 40px;
            color: #ff8c42;
            font-weight: 600;
            padding: 8px 0;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85rem;
            width: 100%;
        }
        .btn-play:hover {
            background: #ff8c42;
            color: #0a0c0f;
            border-color: #ff8c42;
        }
        #user-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .favorite-btn {
            background: none;
            border: none;
            font-size: 2rem;
            padding: 0;
            transition: transform 0.2s;
            line-height: 1;
        }
        .favorite-btn:hover {
            transform: scale(1.1);
        }
        .favorite-btn.text-danger i {
            color: #ff4d4d;
        }
        .favorite-btn.text-secondary i {
            color: #6c757d;
        }
        .game-title-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 1rem;
        }
        #game-description {
            background: #1a1d26;
            border: 1px solid #2c2f36;
            border-radius: 12px;
            padding: 1rem;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #fff;
            border-left: 4px solid #ff8c42;
            padding-left: 1rem;
        }
        .recom-card {
            background: #1a1d26;
            border: 1px solid #2c2f36;
            border-radius: 16px;
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .recom-card:hover {
            border-color: #ff8c42;
        }
        .recom-card .card-img-top {
            height: 120px;
            object-fit: cover;
            background: #2c2f36;
        }
        .recom-card .card-body {
            display: flex;
            flex-direction: column;
        }
        #game-file {
            display: none !important;
        }
        /* Container pentru emulator */
        .emulator-container {
            width: 100%;
            max-width: 1024px;
            aspect-ratio: 4 / 3; /* sau 16/9 dacă preferi */
            margin: 0 auto;
            border: 2px solid #2c2f36;
            border-radius: 16px;
            overflow: hidden;
            background: black;
        }   
        
        .emulator-container canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body data-bs-theme="dark">

<!-- Navbar (identic cu game.html) -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
            <i class="fa-solid fa-gamepad me-2" style="color: #ff8c42;"></i>Game Hub
        </a>
        <div id="user-section">
            <!-- injectat dinamic -->
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- Info joc (identic cu game.html) -->
    <div id="game-info" class="mb-4">
        <div class="game-title-wrapper">
            <h2 class="display-6 mb-0" id="game-title"></h2>
            <button id="favorite-btn" class="favorite-btn text-secondary">
                <i id="favorite-icon" class="fa-regular fa-heart"></i>
            </button>
        </div>
        <p class="text-muted" id="game-file"></p>
        <div id="game-description"></div>
    </div>

    <!-- Container EmulatorJS (în loc de DOSBox) -->
    <div id="emulator" class="emulator-container"></div>

    <!-- Secțiune recomandări (identică cu game.html) -->
    <div id="recommended-section" class="mt-5" style="display: none;">
        <h2 class="section-title">
            <i class="fa-regular fa-star me-2"></i>Recomandate
        </h2>
        <div class="row row-cols-2 row-cols-md-4 g-3" id="recommended-container"></div>
    </div>
</div>

<!-- Script unificat (modul) - la fel ca în game.html, dar cu emulator în loc de DOSBox -->
<script type="module">
    // 1. Importuri Firebase
    import { auth, db } from './js/firebase-config.js';
    import { onAuthStateChange, logout } from './js/auth.js';
    import { doc, getDoc, setDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 2. Variabile globale
    let currentUser = null;
    let currentGameId = null;
    let isFavorite = false;
    let allGames = []; // pentru recomandări

    // 3. Referințe către elemente DOM
    const userSection = document.getElementById('user-section');
    const favoriteBtn = document.getElementById('favorite-btn');
    const favoriteIcon = document.getElementById('favorite-icon');
    const gameTitleEl = document.getElementById('game-title');
    const gameFileEl = document.getElementById('game-file');
    const gameDescEl = document.getElementById('game-description');
    const emulatorEl = document.getElementById('emulator');
    const recommendedSection = document.getElementById('recommended-section');
    const recommendedContainer = document.getElementById('recommended-container');

    // 4. Funcție pentru actualizarea secțiunii utilizator
    function updateUserSection(user) {
        if (user) {
            userSection.innerHTML = `
                <span class="text-light me-2">
                    <i class="fa-regular fa-circle-user me-1"></i>${user.email}
                </span>
                <button class="btn btn-outline-secondary" id="logoutBtn">
                    <i class="fa-solid fa-sign-out-alt me-2"></i>Logout
                </button>
            `;
            document.getElementById('logoutBtn')?.addEventListener('click', async () => {
                await logout();
            });
        } else {
            userSection.innerHTML = `
                <a href="login.html" class="btn btn-play me-2" style="width: auto; padding: 8px 20px;">
                    <i class="fa-solid fa-sign-in-alt me-2"></i>Login
                </a>
                <a href="register.html" class="btn btn-play" style="width: auto; padding: 8px 20px;">
                    <i class="fa-regular fa-circle-play me-2"></i>Register
                </a>
            `;
        }
    }

    // 5. Verifică favorite
    async function checkIfFavorite(uid, gameId) {
        try {
            const favRef = doc(db, 'favorites', uid);
            const favSnap = await getDoc(favRef);
            if (favSnap.exists()) {
                const gameIds = favSnap.data().gameIds || [];
                isFavorite = gameIds.includes(gameId);
            } else {
                await setDoc(favRef, { gameIds: [] });
                isFavorite = false;
            }
            updateFavoriteButton(isFavorite);
        } catch (error) {
            console.error('Eroare la verificarea favorite:', error);
        }
    }

    // 6. Actualizează butonul inimă
    function updateFavoriteButton(fav) {
        if (fav) {
            favoriteIcon.className = 'fa-solid fa-heart';
            favoriteBtn.classList.remove('text-secondary');
            favoriteBtn.classList.add('text-danger');
        } else {
            favoriteIcon.className = 'fa-regular fa-heart';
            favoriteBtn.classList.remove('text-danger');
            favoriteBtn.classList.add('text-secondary');
        }
    }

    // 7. Toggle favorite
    async function toggleFavorite() {
        if (!currentUser) {
            alert('Trebuie să fii autentificat pentru a adăuga la favorite.');
            return;
        }
        if (!currentGameId) return;

        const uid = currentUser.uid;
        const favRef = doc(db, 'favorites', uid);
        try {
            if (isFavorite) {
                await updateDoc(favRef, {
                    gameIds: arrayRemove(currentGameId)
                });
                isFavorite = false;
            } else {
                await updateDoc(favRef, {
                    gameIds: arrayUnion(currentGameId)
                });
                isFavorite = true;
            }
            updateFavoriteButton(isFavorite);
        } catch (error) {
            console.error('Eroare la actualizarea favorite:', error);
        }
    }

    // 8. Pornește emulatorul
    function startEmulator(game) {
        // Găsim platforma și calea ROM
        const platform = game.platform || 'gba';
        const romPath = game.zip;

        window.EJS_player = '#emulator';
        window.EJS_core = platform;
        window.EJS_gameUrl = romPath;
        window.EJS_startOnLoaded = true;
        window.EJS_color = '#ff8c42';
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

        // Încărcăm scriptul emulatorului (dacă nu e deja încărcat)
        if (!document.querySelector('script[src*="loader.js"]')) {
            const script = document.createElement('script');
            script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            document.body.appendChild(script);
        }
    }

    // 9. Încarcă recomandările (cu linkuri corecte)
    function loadRecommended(allGames, currentGame) {
        const otherGames = allGames.filter(g => String(g.id) !== String(currentGame.id));
        if (otherGames.length === 0) return;

        const shuffled = otherGames.sort(() => 0.5 - Math.random());
        const recommended = shuffled.slice(0, 4);

        recommendedSection.style.display = 'block';

        let html = '';
        recommended.forEach(game => {
            const imgSrc = game.imageUrl || 'data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000/svg%22%20width%3D%22150%22%20height%3D%22120%22%20viewBox%3D%220%200%20150%20120%22%3E%3Crect%20width%3D%22150%22%20height%3D%22120%22%20fill%3D%22%232c2f36%22%2F%3E%3Ctext%20x%3D%2275%22%20y%3D%2260%22%20fill%3D%22%239ca3af%22%20font-size%3D%2212%22%20text-anchor%3D%22middle%22%20dominant-baseline%3D%22middle%22%3ENo image%3C%2Ftext%3E%3C%2Fsvg%3E';
            const shortDesc = game.description ? game.description.substring(0, 50) + '…' : 'Descriere lipsă';
            
            // Link corect: pentru DOS -> game.html, pentru altele -> emulator.html cu id
            const gameLink = game.platform === 'dos'
                ? `game.html?id=${game.id}`
                : `emulator.html?id=${game.id}&core=${game.platform}&rom=${encodeURIComponent(game.zip)}&title=${encodeURIComponent(game.title)}`;

            html += `
                <div class="col">
                    <div class="recom-card h-100">
                        <img src="${imgSrc}" class="card-img-top" alt="${game.title}">
                        <div class="card-body d-flex flex-column">
                            <h6 class="card-title">${escapeHtml(game.title)}</h6>
                            <p class="card-text small flex-grow-1 text-muted">${escapeHtml(shortDesc)}</p>
                            <a href="${gameLink}" class="btn btn-sm btn-play mt-auto">
                                <i class="fa-regular fa-circle-play me-2"></i>Joacă
                            </a>
                        </div>
                    </div>
                </div>
            `;
        });
        recommendedContainer.innerHTML = html;
    }

    // 10. Salvează în recente
    function storeRecentlyPlayed(game) {
        const key = 'recentGames';
        let recent = JSON.parse(localStorage.getItem(key)) || [];
        recent = recent.filter(g => String(g.id) !== String(game.id));
        recent.unshift({
            id: game.id,
            title: game.title,
            file: game.file,
            description: game.description,
            imageUrl: game.imageUrl,
            platform: game.platform
        });
        recent = recent.slice(0, 5);
        localStorage.setItem(key, JSON.stringify(recent));
    }

    // 11. Escape HTML
    function escapeHtml(unsafe) {
        return unsafe.replace(/[&<>"']/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            if (m === "'") return '&#039;';
            return m;
        });
    }

    // 12. Încărcare joc
    async function loadGame() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) {
            location.href = 'index.html';
            return;
        }
        currentGameId = id;

        try {
            const res = await fetch('/api/games');
            allGames = await res.json();
            const game = allGames.find(g => String(g.id) === String(id));
            if (!game) {
                alert('Joc inexistent');
                location.href = 'index.html';
                return;
            }

            // Afișează informațiile
            gameTitleEl.textContent = game.title;
            gameFileEl.textContent = game.file;
            if (game.description) {
                gameDescEl.innerHTML = `<i class="fa-regular fa-file-lines me-2"></i>${escapeHtml(game.description)}`;
            } else {
                gameDescEl.innerHTML = '<span class="text-muted"><i class="fa-regular fa-circle-exclamation me-2"></i>Descriere lipsă</span>';
            }

            // Salvează în recente
            storeRecentlyPlayed(game);

            // Pornește emulatorul
            startEmulator(game);

            // Încarcă recomandările
            loadRecommended(allGames, game);

            // Verifică favorite
            if (currentUser) {
                await checkIfFavorite(currentUser.uid, currentGameId);
            } else {
                updateFavoriteButton(false);
            }
        } catch (e) {
            console.error(e);
            gameDescEl.innerHTML = '<p class="text-danger">Eroare la încărcarea jocului.</p>';
        }
    }

    // 13. Ascultător autentificare
    onAuthStateChange(async (user) => {
        currentUser = user;
        updateUserSection(user);
        if (user && currentGameId) {
            await checkIfFavorite(user.uid, currentGameId);
        } else {
            updateFavoriteButton(false);
        }
    });

    // 14. Inițializare
    document.addEventListener('DOMContentLoaded', () => {
        loadGame();
        favoriteBtn.addEventListener('click', toggleFavorite);
    });
</script>
</body>
</html>
