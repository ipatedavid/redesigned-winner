<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autentificare - Game Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: #0a0c0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #1a1d26;
            border: 1px solid #2c2f36;
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
        }
        .btn-auth {
            background: transparent;
            border: 2px solid #ff8c42;
            border-radius: 40px;
            color: #ff8c42;
            font-weight: 600;
            padding: 10px;
            transition: 0.2s;
            width: 100%;
        }
        .btn-auth:hover {
            background: #ff8c42;
            color: #0a0c0f;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 class="text-center mb-4">
            <i class="fa-solid fa-gamepad me-2" style="color: #ff8c42;"></i>Game Hub
        </h2>
        <h5 class="text-center mb-4">Autentificare</h5>
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control bg-dark text-light border-secondary" id="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Parolă</label>
                <input type="password" class="form-control bg-dark text-light border-secondary" id="password" required>
            </div>
            <button type="submit" class="btn-auth">Autentificare</button>
            <p class="text-center mt-3">
                Nu ai cont? <a href="register.html" style="color: #ff8c42;">Înregistrează-te</a>
            </p>
            <div id="message" class="text-center mt-2"></div>
        </form>
    </div>

    <script type="module">
        import { login } from './js/auth.js';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            messageDiv.innerHTML = '<span class="text-info">Se procesează...</span>';
            const result = await login(email, password);
            if (result.success) {
                messageDiv.innerHTML = '<span class="text-success">Autentificare reușită! Redirecționare...</span>';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                messageDiv.innerHTML = `<span class="text-danger">${result.error}</span>`;
            }
        });
    </script>
</body>
</html>
